<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sign in to Prometheus</title><style>body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background-color:#f8f9fa;color:#212529;display:flex;flex-direction:column;min-height:100vh}.navbar{background-color:#343a40;padding:.75rem 1.5rem;display:flex;align-items:center;box-shadow:0 2px 4px rgba(0,0,0,.1)}.navbar-brand{color:#fff;text-decoration:none;font-size:1.25rem;font-weight:500;display:flex;align-items:center}.logo{width:28px;height:28px;background-color:#e6522c;border-radius:50%;margin-right:12px;position:relative}.logo::after{content:"";position:absolute;top:7px;left:7px;width:14px;height:14px;background-color:#fff;border-radius:50%}.login-wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}.login-card{background:#fff;width:100%;max-width:420px;border:1px solid #dee2e6;border-radius:.375rem;box-shadow:0 .5rem 1rem rgba(0,0,0,.05);overflow:hidden}.login-header{padding:2rem 2rem 1.5rem 2rem;text-align:center;border-bottom:1px solid #edf2f7}.login-header h1{margin:0;font-size:1.5rem;font-weight:400;color:#212529}.login-body{padding:2rem}.form-group{margin-bottom:1.25rem}.form-label{display:block;margin-bottom:.5rem;font-weight:500;font-size:.9rem;color:#495057}.form-control{display:block;width:100%;padding:.625rem .75rem;font-size:1rem;font-weight:400;line-height:1.5;color:#212529;background-color:#fff;background-clip:padding-box;border:1px solid #ced4da;border-radius:.25rem;transition:border-color .15s ease-in-out,box-shadow .15s ease-in-out;box-sizing:border-box}.form-control:focus{color:#212529;background-color:#fff;border-color:#86b7fe;outline:0;box-shadow:0 0 0 .25rem rgba(13,110,253,.25)}.form-check{display:flex;align-items:center;margin-bottom:1.5rem}.form-check-input{width:1rem;height:1rem;margin-top:0;margin-right:.5rem;cursor:pointer}.form-check-label{font-size:.9rem;color:#6c757d;cursor:pointer;user-select:none}.btn-primary{display:inline-block;width:100%;font-weight:500;line-height:1.5;color:#fff;text-align:center;text-decoration:none;vertical-align:middle;cursor:pointer;user-select:none;background-color:#0d6efd;border:1px solid #0d6efd;padding:.625rem .75rem;font-size:1rem;border-radius:.25rem;transition:color .15s ease-in-out,background-color .15s ease-in-out,border-color .15s ease-in-out,box-shadow .15s ease-in-out;box-sizing:border-box}.btn-primary:hover{background-color:#0b5ed7;border-color:#0a58ca}.btn-primary:focus{box-shadow:0 0 0 .25rem rgba(49,132,253,.5);outline:0}.login-footer-links{margin-top:1.5rem;text-align:center;font-size:.875rem}.login-footer-links a{color:#0d6efd;text-decoration:none}.login-footer-links a:hover{text-decoration:underline}.site-footer{padding:1.5rem;text-align:center;color:#6c757d;font-size:.875rem;border-top:1px solid #dee2e6;background-color:#fff}</style></head><body><nav class="navbar"><a href="#" class="navbar-brand"><div class="logo"></div>Prometheus</a></nav><div class="login-wrapper"><div class="login-card"><div class="login-header"><h1>Sign in to your account</h1></div><div class="login-body"><form action="#" method="POST" onsubmit="return!1"><div class="form-group"><label class="form-label" for="username">Username</label> <input type="text" id="username" name="username" class="form-control" autocomplete="username" spellcheck="false" required autofocus></div><div class="form-group"><label class="form-label" for="password">Password</label> <input type="password" id="password" name="password" class="form-control" autocomplete="current-password" required></div><div class="form-check"><input type="checkbox" class="form-check-input" id="rememberMe"> <label class="form-check-label" for="rememberMe">Remember me on this device</label></div><button type="submit" class="btn-primary">Sign in</button></form><div class="login-footer-links"><a href="#">Forgot your password?</a></div></div></div></div><footer class="site-footer"><div>Prometheus Time Series Collection and Processing Server</div></footer></body></html>
